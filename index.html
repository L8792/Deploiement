<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Déploiement</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root {
  --green:       #1a6b3c;
  --green-mid:   #2d9e5f;
  --green-light: #e8f5ee;
  --border:      #dde8e2;
  --text:        #1a2e24;
  --muted:       #7a9e8a;
  --bg:          #f4f7f5;
  --white:       #ffffff;
  --red:         #c0392b;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text);
       display:flex; flex-direction:column; height:100vh; overflow:hidden; }

/* HEADER */
header { display:flex; align-items:center; gap:14px; padding:0 20px; height:50px;
         background:var(--white); border-bottom:1px solid var(--border);
         box-shadow:0 1px 4px rgba(26,107,60,.06); flex-shrink:0; z-index:1000; }
.logo { background:var(--green); color:#fff; font-family:'DM Mono',monospace;
        font-size:.75rem; font-weight:500; padding:4px 9px; letter-spacing:.06em; }
header h1 { font-size:1rem; font-weight:700; color:var(--green); letter-spacing:-.02em; }

/* LAYOUT */
.layout { display:grid; grid-template-columns:340px 1fr; flex:1; min-height:0; }

/* PANEL */
.panel { background:var(--white); border-right:1px solid var(--border);
         display:flex; flex-direction:column; overflow:hidden; position:relative; }
.panel-scroll { flex:1; overflow-y:auto; padding-bottom:90px; }

.section { padding:14px 16px; border-bottom:1px solid var(--border); }
.section-title { font-size:.6rem; font-weight:700; letter-spacing:.12em;
                 text-transform:uppercase; color:var(--muted); margin-bottom:10px; }

/* INPUTS */
.field { margin-bottom:10px; }
.field:last-child { margin-bottom:0; }
.field label { display:block; font-size:.68rem; font-weight:500; color:var(--muted);
               letter-spacing:.05em; text-transform:uppercase; margin-bottom:4px; }
.field input[type="text"] { width:100%; border:1px solid var(--border); background:var(--bg);
  color:var(--text); font-family:'DM Sans',sans-serif; font-size:.85rem;
  padding:8px 10px; outline:none; transition:border-color .15s; border-radius:2px; }
.field input[type="text"]:focus { border-color:var(--green); }
.field input[type="text"]::placeholder { color:var(--muted); }
.range-row { display:flex; gap:10px; }
.range-row .field { flex:1; }
.field input[type="range"] { width:100%; accent-color:var(--green); cursor:pointer; margin-top:2px; }
.range-val { display:flex; justify-content:space-between; align-items:baseline; margin-top:2px; }
.range-val strong { font-family:'DM Mono',monospace; font-size:1.1rem; color:var(--green); font-weight:500; }
.range-val small { font-size:.66rem; color:var(--muted); }

/* PLACE TYPES */
.select-all-row { display:flex; gap:6px; margin-bottom:8px; }
.btn-small { font-size:.67rem; font-family:'DM Sans',sans-serif; padding:3px 8px;
             border:1px solid var(--border); background:var(--white); color:var(--muted);
             cursor:pointer; transition:all .15s; border-radius:2px; }
.btn-small:hover { border-color:var(--green); color:var(--green); }

.place-grid { display:grid; grid-template-columns:1fr 1fr; gap:5px; }
.place-toggle { display:flex; align-items:center; gap:7px; padding:6px 8px;
                border:1px solid var(--border); background:var(--bg); cursor:pointer;
                transition:all .15s; user-select:none; border-radius:2px; }
.place-toggle:hover { border-color:var(--green-mid); background:var(--green-light); }
.place-toggle.active { border-color:var(--green); background:var(--green-light); }
.pt-icon { font-size:.95rem; flex-shrink:0; }
.pt-info { flex:1; min-width:0; }
.pt-name { font-size:.73rem; font-weight:600; color:var(--text); line-height:1.2; }
.pt-score { font-size:.6rem; color:var(--muted); font-family:'DM Mono',monospace; }
.pt-check { width:13px; height:13px; border:1.5px solid var(--border); border-radius:2px;
            background:var(--white); flex-shrink:0; display:flex; align-items:center;
            justify-content:center; font-size:.55rem; transition:all .15s; }
.place-toggle.active .pt-check { background:var(--green); border-color:var(--green); color:#fff; }

/* FOOTER */
.panel-footer { position:absolute; bottom:0; left:0; width:100%;
                background:var(--white); border-top:1px solid var(--border); padding:12px 16px; }
.btn-run { width:100%; background:var(--green); color:#fff; border:none;
           font-family:'DM Sans',sans-serif; font-weight:700; font-size:.88rem;
           letter-spacing:.04em; padding:10px; cursor:pointer; transition:all .15s;
           text-transform:uppercase; border-radius:2px; }
.btn-run:hover:not(:disabled) { background:var(--green-mid); }
.btn-run:disabled { background:var(--border); color:var(--muted); cursor:not-allowed; }

/* STATUS */
.status { font-size:.7rem; color:var(--muted); margin-top:7px; min-height:16px;
          display:flex; align-items:center; gap:6px; font-family:'DM Mono',monospace; }
.status.running { color:var(--green); }
.status.error   { color:var(--red); }
.status.ok      { color:var(--green-mid); }
.spinner { width:10px; height:10px; border:2px solid var(--green-light);
           border-top-color:var(--green); border-radius:50%; animation:spin .7s linear infinite;
           display:none; flex-shrink:0; }
.status.running .spinner { display:block; }
@keyframes spin { to { transform:rotate(360deg); } }

/* RESULTS */
.result-item { padding:11px 16px; border-bottom:1px solid var(--border); cursor:pointer;
               transition:background .12s; display:flex; align-items:flex-start; gap:10px; }
.result-item:hover { background:var(--green-light); }
.result-num { width:26px; height:26px; border-radius:4px; display:flex; align-items:center;
              justify-content:center; font-weight:700; font-size:.8rem; color:#fff;
              flex-shrink:0; margin-top:1px; }
.result-info { flex:1; min-width:0; }
.result-name { font-size:.82rem; font-weight:600; color:var(--text); }
.result-meta { font-size:.68rem; color:var(--muted); margin-top:2px; display:flex; gap:8px; flex-wrap:wrap; }
.result-stars { font-size:.68rem; color:var(--green); margin-top:2px; }
.result-bonus { font-size:.63rem; color:var(--green-mid); margin-top:3px; line-height:1.5; }

.stat-row { display:flex; justify-content:space-between; padding:6px 0;
            border-bottom:1px solid var(--border); font-size:.75rem; }
.stat-row span { color:var(--muted); }
.stat-row b { color:var(--green); font-family:'DM Mono',monospace; font-weight:500; }

.empty-state { display:flex; flex-direction:column; align-items:center; justify-content:center;
               padding:40px 20px; color:var(--muted); text-align:center; gap:10px; }
.empty-state .big { font-size:2.2rem; }
.empty-state p { font-size:.76rem; line-height:1.6; max-width:220px; }

/* MAP */
#map { width:100%; height:100%; }
.leaflet-popup-content-wrapper { border-radius:6px; box-shadow:0 2px 16px rgba(0,0,0,.12);
  border:1px solid var(--border); font-family:'DM Sans',sans-serif; }
.leaflet-popup-content { margin:12px 14px; }
.leaflet-control-layers { border:1px solid var(--border) !important; border-radius:6px !important;
  box-shadow:0 2px 8px rgba(0,0,0,.08) !important; font-family:'DM Sans',sans-serif; font-size:.8rem; }
</style>
</head>
<body>

<header>
  <div class="logo">D+</div>
  <h1>Déploiement</h1>
</header>

<div class="layout">

  <div class="panel">
    <div class="panel-scroll">

      <!-- Adresse -->
      <div class="section">
        <div class="section-title">Point central</div>
        <div class="field">
          <label>Adresse</label>
          <input type="text" id="address" placeholder="Ex : Place Bellecour, Lyon" />
        </div>
      </div>

      <!-- Paramètres -->
      <div class="section">
        <div class="section-title">Paramètres</div>
        <div class="range-row">
          <div class="field">
            <label>Joueurs</label>
            <input type="range" id="nPlayers" min="2" max="20" value="5"
              oninput="document.getElementById('nVal').textContent=this.value">
            <div class="range-val">
              <strong id="nVal">5</strong><small>personnes</small>
            </div>
          </div>
          <div class="field">
            <label>Temps cible</label>
            <input type="range" id="tMinutes" min="2" max="30" value="10"
              oninput="document.getElementById('tVal').textContent=this.value">
            <div class="range-val">
              <strong id="tVal">10</strong><small>min à pied</small>
            </div>
          </div>
        </div>
      </div>

      <!-- Types de lieux -->
      <div class="section">
        <div class="section-title">Types de lieux</div>
        <div class="select-all-row">
          <button class="btn-small" onclick="toggleAll(true)">Tout cocher</button>
          <button class="btn-small" onclick="toggleAll(false)">Tout décocher</button>
        </div>
        <div class="place-grid" id="placeGrid"></div>
      </div>

      <!-- Stats (masqués au départ) -->
      <div class="section" id="statsSection" style="display:none;">
        <div class="section-title">Statistiques</div>
        <div id="statsContent"></div>
      </div>

      <!-- Résultats -->
      <div id="resultsList">
        <div class="empty-state">
          <div class="big">◎</div>
          <p>Choisis une adresse, un temps et les types de lieux, puis lance le déploiement.</p>
        </div>
      </div>

    </div>

    <div class="panel-footer">
      <button class="btn-run" id="btnRun" onclick="run()">▶ Déployer</button>
      <div class="status" id="status"><div class="spinner"></div><span>En attente…</span></div>
    </div>
  </div>

  <div id="map"></div>
</div>

<script>
// ═══════════════════════════════════════════════
// TYPES DE LIEUX
// ═══════════════════════════════════════════════
const PLACE_TYPES = [
  { id:"park",           label:"Parc",           icon:"🌳", score:9, group:"vert",
    query:(b)=>`node["leisure"="park"](${b});\n  way["leisure"="park"](${b});` },
  { id:"garden",         label:"Jardin",          icon:"🌿", score:8, group:"vert",
    query:(b)=>`node["leisure"="garden"](${b});\n  way["leisure"="garden"](${b});` },
  { id:"nature_reserve", label:"Réserve",         icon:"🦋", score:7, group:"vert",
    query:(b)=>`node["leisure"="nature_reserve"](${b});\n  way["leisure"="nature_reserve"](${b});` },
  { id:"pitch",          label:"Terrain sport",   icon:"⚽", score:7, group:"vert",
    query:(b)=>`node["leisure"="pitch"](${b});\n  way["leisure"="pitch"](${b});` },
  { id:"playground",     label:"Aire de jeux",    icon:"🛝", score:7, group:"vert",
    query:(b)=>`node["leisure"="playground"](${b});` },
  { id:"square",         label:"Place publique",  icon:"🏛", score:7, group:"vert",
    query:(b)=>`node["place"="square"](${b});\n  way["place"="square"](${b});` },
  { id:"viewpoint",      label:"Belvédère",       icon:"🔭", score:7, group:"vert",
    query:(b)=>`node["tourism"="viewpoint"](${b});` },
  { id:"fountain",       label:"Fontaine",        icon:"⛲", score:6, group:"vert",
    query:(b)=>`node["amenity"="fountain"](${b});` },
  { id:"bench",          label:"Bancs",           icon:"🪑", score:5, group:"urban",
    query:(b)=>`node["amenity"="bench"](${b});` },
  { id:"shelter",        label:"Abri",            icon:"🛖", score:6, group:"urban",
    query:(b)=>`node["amenity"="shelter"](${b});` },
  { id:"bus_stop",       label:"Arrêt bus",       icon:"🚌", score:5, group:"transit",
    query:(b)=>`node["highway"="bus_stop"](${b});` },
  { id:"tram_stop",      label:"Arrêt tram",      icon:"🚃", score:7, group:"transit",
    query:(b)=>`node["railway"="tram_stop"](${b});` },
  { id:"station",        label:"Gare / Métro",    icon:"🚇", score:8, group:"transit",
    query:(b)=>`node["railway"~"^(station|subway_entrance|halt)$"](${b});` },
  { id:"cafe",           label:"Café",            icon:"☕", score:8, group:"commerce",
    query:(b)=>`node["amenity"="cafe"](${b});` },
  { id:"bakery",         label:"Boulangerie",     icon:"🥐", score:7, group:"commerce",
    query:(b)=>`node["shop"="bakery"](${b});` },
  { id:"bar",            label:"Bar",             icon:"🍺", score:6, group:"commerce",
    query:(b)=>`node["amenity"="bar"](${b});` },
  { id:"restaurant",     label:"Restaurant",      icon:"🍽", score:5, group:"commerce",
    query:(b)=>`node["amenity"="restaurant"](${b});` },
  { id:"kiosk",          label:"Kiosque",         icon:"📰", score:6, group:"commerce",
    query:(b)=>`node["shop"~"^(kiosk|newsagent)$"](${b});` },
  { id:"marketplace",    label:"Marché",          icon:"🏪", score:6, group:"commerce",
    query:(b)=>`node["amenity"="marketplace"](${b});` },
];

const WAIT_SCORE = Object.fromEntries(PLACE_TYPES.map(p => [p.id, p.score]));
const activeTypes = new Set(PLACE_TYPES.map(p=>p.id).filter(id=>id!=='restaurant'));

function buildPlaceGrid() {
  const grid = document.getElementById('placeGrid');
  grid.innerHTML = '';
  PLACE_TYPES.forEach(pt => {
    const div = document.createElement('div');
    div.className = 'place-toggle' + (activeTypes.has(pt.id) ? ' active' : '');
    div.dataset.id = pt.id;
    div.innerHTML = `<span class="pt-icon">${pt.icon}</span>
      <div class="pt-info"><div class="pt-name">${pt.label}</div>
      <div class="pt-score">score ${pt.score}/10</div></div>
      <div class="pt-check">${activeTypes.has(pt.id)?'✓':''}</div>`;
    div.onclick = () => {
      if (activeTypes.has(pt.id)) {
        activeTypes.delete(pt.id); div.classList.remove('active'); div.querySelector('.pt-check').textContent='';
      } else {
        activeTypes.add(pt.id); div.classList.add('active'); div.querySelector('.pt-check').textContent='✓';
      }
    };
    grid.appendChild(div);
  });
}
function toggleAll(on) {
  PLACE_TYPES.forEach(pt => { if(on) activeTypes.add(pt.id); else activeTypes.delete(pt.id); });
  buildPlaceGrid();
}
buildPlaceGrid();

// ═══════════════════════════════════════════════
// MAP
// ═══════════════════════════════════════════════
const map = L.map('map').setView([46.2, 2.3], 6);

const cartoLight = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
  { attribution:'© OpenStreetMap © CARTO', maxZoom:19 });
const satellite  = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
  { attribution:'© Esri, Maxar, Earthstar Geographics', maxZoom:19 });
const osmStd     = L.tileLayer('https://tile.openstreetmap.bzh/br/{z}/{x}/{y}.png',
  { attribution:'© OpenStreetMap contributors', maxZoom:19 });

cartoLight.addTo(map);
L.control.layers(
  { "🗺 Plan clair":cartoLight, "🛰 Satellite":satellite, "🗺 OSM Standard":osmStd },
  {}, { position:'topright', collapsed:false }
).addTo(map);

let drawnLayers = [], centerMarker = null;
let globalLines = [];  // lignes centre→joueur par index

const COLORS = ["#1a6b3c","#e07b2a","#2d6fa3","#8b3ab8","#c0392b","#1a7a6e","#7d5a00","#1a4f7a","#5a3080","#8b2020"];
const SECTOR_COLORS = ['#1a6b3c','#2d9e5f','#34c472','#7dcfa4','#b5e8ce'];

// ═══════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════
function setStatus(msg, type='') {
  const el = document.getElementById('status');
  el.className = 'status ' + type;
  el.innerHTML = `<div class="spinner"></div><span>${msg}</span>`;
}

function haversine(a, b) {
  const R=6371000, dLat=(b.lat-a.lat)*Math.PI/180, dLon=(b.lon-a.lon)*Math.PI/180;
  const x=Math.sin(dLat/2)**2+Math.cos(a.lat*Math.PI/180)*Math.cos(b.lat*Math.PI/180)*Math.sin(dLon/2)**2;
  return 2*R*Math.asin(Math.sqrt(x));
}

function bearing(o, p) {
  const la1=o.lat*Math.PI/180, la2=p.lat*Math.PI/180, dLon=(p.lon-o.lon)*Math.PI/180;
  return (Math.atan2(Math.sin(dLon)*Math.cos(la2), Math.cos(la1)*Math.sin(la2)-Math.sin(la1)*Math.cos(la2)*Math.cos(dLon))*180/Math.PI+360)%360;
}

function greedyDisperse(pool, n) {
  if (pool.length<=n) return pool;
  const cl={lat:pool.reduce((s,c)=>s+c.lat,0)/pool.length, lon:pool.reduce((s,c)=>s+c.lon,0)/pool.length};
  let rem=[...pool].sort((a,b)=>haversine(b,cl)-haversine(a,cl));
  const sel=[rem.shift()];
  while (sel.length<n && rem.length) {
    let best=null, bs=-1;
    for (const c of rem) { const d=Math.min(...sel.map(s=>haversine(c,s))); if(d>bs){bs=d;best=c;} }
    sel.push(best); rem=rem.filter(c=>c!==best);
  }
  return sel;
}

function detectBonuses(tags) {
  const b=[];
  if(tags.covered==='yes'||tags.covered==='arcade') b.push('🏠 abrité');
  if(tags.bench==='yes') b.push('🪑 bancs');
  if(tags.shelter==='yes') b.push('⛺ abri');
  if(tags.lit==='yes') b.push('💡 éclairé');
  if(['paving_stones','asphalt','concrete'].includes(tags.surface)) b.push('🚶 sol dur');
  if(['yes','public','permissive'].includes(tags.access)) b.push('✅ accès public');
  if(tags.fee==='no') b.push('🆓 gratuit');
  return b;
}

function clearMap() {
  drawnLayers.forEach(l=>map.removeLayer(l)); drawnLayers=[];
  if(centerMarker){map.removeLayer(centerMarker);centerMarker=null;}
}

// ═══════════════════════════════════════════════
// API CALLS
// ═══════════════════════════════════════════════
async function geocode(address) {
  const r=await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(address)}&format=json&limit=1`,{headers:{'Accept-Language':'fr'}});
  const d=await r.json();
  if(!d.length) throw new Error('Adresse introuvable');
  return {lat:parseFloat(d[0].lat),lon:parseFloat(d[0].lon),display:d[0].display_name};
}

async function fetchCandidates(bbox) {
  const lines=PLACE_TYPES.filter(pt=>activeTypes.has(pt.id)).map(pt=>pt.query(bbox)).join('\n  ');
  const query=`[out:json][timeout:30];\n(\n  ${lines}\n);\nout center tags;`;
  const servers=['https://overpass-api.de/api/interpreter','https://overpass.kumi.systems/api/interpreter'];
  for(let i=0;i<servers.length*2;i++){
    try{
      const r=await fetch(servers[i%servers.length],{method:'POST',
        body:'data='+encodeURIComponent(query),
        headers:{'Content-Type':'application/x-www-form-urlencoded','User-Agent':'deploiement/1.0'}});
      if(r.ok){const d=await r.json();return d.elements||[];}
    }catch(e){}
    await new Promise(res=>setTimeout(res,3000));
  }
  throw new Error('Overpass inaccessible — réessaie dans quelques secondes');
}

async function getWalkTimes(center, pool) {
  const coords=[`${center.lon},${center.lat}`,...pool.map(c=>`${c.lon},${c.lat}`)].join(';');
  const dsts=pool.map((_,i)=>i+1).join(';');
  const r=await fetch(`https://router.project-osrm.org/table/v1/foot/${coords}?sources=0&destinations=${dsts}&annotations=duration`);
  const d=await r.json();
  return (d.durations&&d.durations[0])||[];
}

// ═══════════════════════════════════════════════
// MAIN
// ═══════════════════════════════════════════════
async function run() {
  const address=document.getElementById('address').value.trim();
  const N=parseInt(document.getElementById('nPlayers').value);
  const T=parseInt(document.getElementById('tMinutes').value);
  const K=3;

  if(!address){setStatus('Saisis une adresse.','error');return;}
  if(activeTypes.size===0){setStatus('Sélectionne au moins un type de lieu.','error');return;}

  document.getElementById('btnRun').disabled=true;
  clearMap();
  document.getElementById('statsSection').style.display='none';
  document.getElementById('resultsList').innerHTML='<div class="empty-state"><div class="big">⏳</div><p>Calcul en cours…</p></div>';

  try {
    // 1 — Geocode
    setStatus('Géocodage de l\'adresse…','running');
    const center=await geocode(address);

    centerMarker=L.marker([center.lat,center.lon],{icon:L.divIcon({className:'',
      html:`<div style="width:18px;height:18px;border-radius:50%;background:#fff;border:3px solid #1a6b3c;box-shadow:0 0 10px rgba(26,107,60,.4);"></div>`,
      iconSize:[18,18],iconAnchor:[9,9]})}).addTo(map)
      .bindPopup(`<b>Point central</b><br><small style="color:#7a9e8a;">${center.display}</small>`);

    // 2 — Overpass
    const T_sec=T*60, SPEED=3500/60;  // 3.5 km/h piéton
    const rM=T*(3500/60)*1.6, dLat=rM/111320, dLon=rM/(111320*Math.cos(center.lat*Math.PI/180));  // 3.5 km/h
    const bbox=`${center.lat-dLat},${center.lon-dLon},${center.lat+dLat},${center.lon+dLon}`;

    setStatus(`Recherche des lieux (${activeTypes.size} types actifs)…`,'running');
    const elements=await fetchCandidates(bbox);

    // Parse
    const candidates=[];
    for(const el of elements){
      const clat=el.lat??el.center?.lat, clon=el.lon??el.center?.lon;
      if(!clat||!clon) continue;
      const tags=el.tags||{};
      const ptype=tags.leisure||tags.amenity||tags.highway||tags.railway||tags.tourism||tags.place||tags.shop||'other';
      if(!activeTypes.has(ptype)||!WAIT_SCORE[ptype]) continue;
      const bonuses=detectBonuses(tags);
      const bonusScore=(tags.covered==='yes'?1:0)+(tags.bench==='yes'?1:0)+(tags.shelter==='yes'?1:0);
      candidates.push({
        lat:clat, lon:clon,
        name:tags.name||tags['name:fr']||ptype,
        type:ptype,
        wait_score:WAIT_SCORE[ptype]+bonusScore,
        tags, bonuses,
        dist_geo:haversine(center,{lat:clat,lon:clon}),
        bearing:bearing(center,{lat:clat,lon:clon})
      });
    }
    if(candidates.length<N) throw new Error(`Seulement ${candidates.length} lieux trouvés pour ${N} joueurs. Élargis la sélection ou augmente le temps.`);

    // 3 — Pré-filtre géo
    const rMin=T_sec*SPEED*0.5, rMax=T_sec*SPEED*1.6;
    let geoFiltered=candidates.filter(c=>c.dist_geo>=rMin&&c.dist_geo<=rMax);
    if(geoFiltered.length<N)
      geoFiltered=[...candidates].sort((a,b)=>Math.abs(a.dist_geo-T_sec*SPEED)-Math.abs(b.dist_geo-T_sec*SPEED)).slice(0,Math.max(N*6,30));

    // 4 — Secteurs
    const sectorSize=360/N;
    const sectors=Array.from({length:N},()=>[]);
    for(const c of geoFiltered) sectors[Math.floor(c.bearing/sectorSize)%N].push(c);

    // 5 — Top K par secteur
    const prePool=[], emptySectors=[];
    for(let i=0;i<N;i++){
      if(!sectors[i].length){emptySectors.push(i);continue;}
      const sorted=[...sectors[i]].sort((a,b)=>b.wait_score-a.wait_score||(Math.abs(a.dist_geo-T_sec*SPEED)-Math.abs(b.dist_geo-T_sec*SPEED)));
      prePool.push(...sorted.slice(0,K));
    }
    if(!prePool.length) throw new Error('Aucun candidat dans les secteurs.');

    // 6 — OSRM
    setStatus(`Calcul temps de marche (${prePool.length} lieux)…`,'running');
    const walkTimes=await getWalkTimes(center,prePool);
    prePool.forEach((c,i)=>{c.walk_sec=walkTimes[i]??9999;c.walk_min=c.walk_sec/60;});

    // 7 — Sélection 1 par secteur
    const margin=Math.max(90,T_sec*0.2);
    const selected=[];
    const finalEmpty=[...emptySectors];

    for(let i=0;i<N;i++){
      if(!sectors[i].length) continue;
      const sTimed=sectors[i].filter(c=>prePool.includes(c));
      const valid=sTimed.filter(c=>c.walk_sec<9999);
      if(!valid.length){finalEmpty.push(i);continue;}
      const inMargin=valid.filter(c=>Math.abs(c.walk_sec-T_sec)<=margin);
      const pool=inMargin.length?inMargin:valid;
      pool.sort((a,b)=>Math.abs(a.walk_sec-T_sec)-Math.abs(b.walk_sec-T_sec)||b.wait_score-a.wait_score);
      selected.push(pool[0]);
    }

    // Fallback greedy
    if(finalEmpty.length&&selected.length<N){
      const already=new Set(selected);
      const rem=prePool.filter(c=>!already.has(c)&&c.walk_sec<9999)
        .sort((a,b)=>Math.abs(a.walk_sec-T_sec)-Math.abs(b.walk_sec-T_sec));
      selected.push(...greedyDisperse(rem,N-selected.length));
    }
    if(!selected.length) throw new Error('Aucun résultat. Essaie d\'autres types de lieux.');

    // Store globals for swap/drag/export
    globalSelected    = selected;
    globalPrePool     = prePool;
    globalGeoFiltered = geoFiltered;  // tous les candidats — alternatives infinies
    globalCenter      = center;
    globalN           = N;
    globalT           = T;

    // Build sector->candidates map for alternatives
    const sectorMap = Array.from({length:N}, (_,i) =>
      prePool.filter(c => Math.floor(c.bearing/sectorSize)%N === i)
    );

    renderResults(selected, center, N, T, T_sec, sectorMap);

  } catch(e) { setStatus('Erreur : '+e.message,'error'); console.error(e); }
  document.getElementById('btnRun').disabled=false;
}

// ═══════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════
function renderResults(selected,center,N,T,T_sec,sectorMap){
  globalMarkers = [];
  globalLines   = [];
  const wm=selected.map(p=>p.walk_min);
  const mean=wm.reduce((a,b)=>a+b,0)/wm.length;
  const std=Math.sqrt(wm.map(t=>(t-mean)**2).reduce((a,b)=>a+b,0)/wm.length);
  const dists=[];
  for(let i=0;i<selected.length;i++) for(let j=i+1;j<selected.length;j++) dists.push(haversine(selected[i],selected[j]));

  // Stats
  document.getElementById('statsSection').style.display='';
  document.getElementById('statsContent').innerHTML=`
    <div class="stat-row"><span>Temps moyen</span><b>${mean.toFixed(1)} min</b></div>
    <div class="stat-row"><span>Écart-type</span><b>${std.toFixed(2)} min</b></div>
    <div class="stat-row"><span>Min / Max</span><b>${Math.min(...wm).toFixed(1)} / ${Math.max(...wm).toFixed(1)} min</b></div>
    <div class="stat-row"><span>Distance min entre joueurs</span><b>${Math.round(Math.min(...dists))} m</b></div>
    <div class="stat-row"><span>Distance max entre joueurs</span><b>${Math.round(Math.max(...dists))} m</b></div>
    <div style="margin-top:10px;">
      <button onclick="exportCSV()" style="width:100%;padding:8px;border:1px solid #1a6b3c;
        background:#e8f5ee;color:#1a6b3c;font-family:'DM Sans',sans-serif;font-size:.78rem;
        font-weight:600;cursor:pointer;border-radius:2px;letter-spacing:.04em;transition:all .15s;"
        onmouseover="this.style.background='#1a6b3c';this.style.color='#fff';"
        onmouseout="this.style.background='#e8f5ee';this.style.color='#1a6b3c';">
        ↓ Exporter en CSV
      </button>
    </div>`;

  // Secteurs sur la carte
  const refR=T*(3500/60), sectorSize=360/N;  // 3.5 km/h
  for(let i=0;i<N;i++){
    const a0=(i*360/N-90)*Math.PI/180, a1=((i+1)*360/N-90)*Math.PI/180;
    const pts=[[center.lat,center.lon]];
    for(let s=0;s<=20;s++){
      const a=a0+(a1-a0)*s/20;
      pts.push([center.lat+refR*Math.cos(a)/111320, center.lon+refR*Math.sin(a)/(111320*Math.cos(center.lat*Math.PI/180))]);
    }
    pts.push([center.lat,center.lon]);
    drawnLayers.push(L.polygon(pts,{color:SECTOR_COLORS[i%SECTOR_COLORS.length],weight:1,opacity:0.3,fillOpacity:0.04}).addTo(map));
  }

  // Liste + marqueurs
  const list=document.getElementById('resultsList');
  list.innerHTML='';

  selected.forEach((p,i)=>{
    const color=COLORS[i%COLORS.length];
    const ptDef=PLACE_TYPES.find(pt=>pt.id===p.type);
    const icon=ptDef?ptDef.icon:'📍';
    const stars='★'.repeat(Math.min(p.wait_score,10))+'☆'.repeat(Math.max(0,10-p.wait_score));

    // Popup
    const bonusItems=p.bonuses.map(b=>`<div style="padding:3px 0;border-bottom:1px solid #eee;font-size:12px;">${b}</div>`).join('');
    const bonusSection=p.bonuses.length?`
      <div style="margin-top:8px;padding-top:6px;border-top:2px solid #1a6b3c;">
        <div style="font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:#7a9e8a;margin-bottom:4px;">Points bonus</div>
        ${bonusItems}
      </div>`:'';
    const popup=`<div style="min-width:190px;font-family:'DM Sans',sans-serif;">
      <div style="font-weight:700;font-size:14px;color:#1a2e24;margin-bottom:3px;">
        <span style="display:inline-block;width:20px;height:20px;border-radius:3px;background:${color};color:#fff;text-align:center;line-height:20px;font-size:11px;margin-right:5px;">${i+1}</span>${p.name}
      </div>
      <div style="color:#7a9e8a;font-size:12px;">${icon} ${p.type}</div>
      <div style="margin-top:6px;font-size:13px;">⏱ <b>${p.walk_min.toFixed(1)} min</b> à pied</div>
      <div style="color:#1a6b3c;font-size:12px;margin-top:2px;">${stars} <b>${p.wait_score}/10</b></div>
      ${bonusSection}
      <div style="margin-top:6px;font-size:10px;color:#aaa;font-family:monospace;">${p.lat.toFixed(5)}, ${p.lon.toFixed(5)}</div>
    </div>`;

    // Sector candidates for alternatives
    const playerBearing = p.bearing ?? bearing(center, p);
    const playerSector  = sectorMap ? Math.floor(playerBearing/(360/N))%N : -1;
    const sectorCands   = sectorMap ? (sectorMap[playerSector]||[]) : [];

    // Build popup with alternatives
    const popupContent = buildAlternativesPopup(i, p, sectorCands, null, color);

    // Draggable marker
    const marker = L.marker([p.lat, p.lon], {
      draggable: true,
      icon: L.divIcon({ className:'',
        html:`<div style="width:30px;height:30px;border-radius:5px;background:${color};color:#fff;
              display:flex;align-items:center;justify-content:center;font-family:'DM Sans',sans-serif;
              font-weight:700;font-size:13px;border:2px solid rgba(0,0,0,.12);
              box-shadow:0 2px 8px rgba(0,0,0,.2);cursor:grab;" title="Glisser pour déplacer">${i+1}</div>`,
        iconSize:[30,30], iconAnchor:[15,15] })
    }).addTo(map).bindPopup(popupContent, {maxWidth:260});

    // Live line update while dragging
    const lineCoords = [[center.lat,center.lon],[p.lat,p.lon]];
    const line = L.polyline(lineCoords, {color:'#1a6b3c',opacity:0.22,weight:1.5,dashArray:'5 7'}).addTo(map);

    marker.on('drag', e => {
      const ll = e.target.getLatLng();
      line.setLatLngs([[center.lat,center.lon],[ll.lat,ll.lng]]);
    });

    marker.on('dragend', async e => {
      const ll = e.target.getLatLng();
      // Reverse geocode
      const newName = await reverseGeocode(ll.lat, ll.lng);
      // Recalculate walk time via OSRM
      let walkMin = p.walk_min;
      try {
        const url = `https://router.project-osrm.org/route/v1/foot/${center.lon},${center.lat};${ll.lng},${ll.lat}?overview=false`;
        const rd  = await (await fetch(url)).json();
        if (rd.routes && rd.routes[0]) walkMin = rd.routes[0].duration / 60;
      } catch(err) {}
      // Update candidate
      globalSelected[i] = { ...globalSelected[i], lat:ll.lat, lon:ll.lng, name:newName,
        walk_min:walkMin, walk_sec:walkMin*60, bonuses:[], wait_score:5, type:'custom', tags:{} };
      // Update popup
      const updatedPopup = buildAlternativesPopup(i, globalSelected[i], [], null, color);
      marker.setPopupContent(updatedPopup);
      marker.openPopup();
      // Update list item
      const nameEl = document.getElementById('result-name-'+i);
      const metaEl = document.getElementById('result-meta-'+i);
      if (nameEl) nameEl.textContent = newName;
      if (metaEl) metaEl.innerHTML = `<span>📍 déplacé manuellement</span><span>⏱ ${walkMin.toFixed(1)} min</span>`;
      line.setLatLngs([[center.lat,center.lon],[ll.lat,ll.lng]]);
    });

    drawnLayers.push(marker, line);
    globalMarkers[i] = marker;
    globalLines[i]   = line;

    // List item
    const item = document.createElement('div');
    item.className = 'result-item';
    item.innerHTML = `
      <div class="result-num" style="background:${color}">${i+1}</div>
      <div class="result-info">
        <div class="result-name" id="result-name-${i}">${p.name}</div>
        <div class="result-meta" id="result-meta-${i}">
          <span>${icon} ${p.type}</span><span>⏱ ${p.walk_min.toFixed(1)} min</span>
        </div>
        <div class="result-stars">${stars} ${p.wait_score}/10</div>
        ${p.bonuses.length?`<div class="result-bonus">${p.bonuses.join(' · ')}</div>`:''}
        <div style="font-size:.62rem;color:#aaa;margin-top:3px;font-family:'DM Mono',monospace;">
          ↔ glisser sur la carte pour déplacer
        </div>
      </div>`;
    item.onclick = () => { map.setView([p.lat,p.lon],17); marker.openPopup(); };
    list.appendChild(item);
  });

  map.fitBounds([[center.lat,center.lon],...selected.map(p=>[p.lat,p.lon])],{padding:[40,40]});
  setStatus(`${selected.length} positions trouvées ✓`,'ok');
}

document.getElementById('address').addEventListener('keydown',e=>{if(e.key==='Enter')run();});

// ═══════════════════════════════════════════════
// GLOBAL STATE for alternatives + drag + export
// ═══════════════════════════════════════════════
let globalSelected    = [];
let globalPrePool     = [];
let globalGeoFiltered = [];  // tous les candidats filtrés géo — base des alternatives infinies
let globalCenter      = null;
let globalN           = 5;
let globalT           = 10;
let globalMarkers     = [];  // référence aux markers Leaflet par index joueur

// ═══════════════════════════════════════════════
// REVERSE GEOCODE
// ═══════════════════════════════════════════════
async function reverseGeocode(lat, lon) {
  try {
    const r = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&zoom=18`,
      { headers: {'Accept-Language':'fr'} });
    const d = await r.json();
    const t = d.address;
    return t.amenity || t.leisure || t.shop || t.road || t.pedestrian || t.suburb || 'Position personnalisée';
  } catch(e) { return 'Position personnalisée'; }
}

// ═══════════════════════════════════════════════
// ALTERNATIVES POPUP — infinies depuis geoFiltered
// ═══════════════════════════════════════════════

// Récupère toutes les alternatives d'un secteur pour un candidat donné
// Source : globalGeoFiltered (tous candidats géo-filtrés) + walk_sec si calculé
function getSectorAlternatives(playerIdx, currentCandidate) {
  const sectorSize = 360 / globalN;
  const T_sec = globalT * 60;
  // Secteur du candidat actuel
  const brg = currentCandidate.bearing ?? bearing(globalCenter, currentCandidate);
  const sectorIdx = Math.floor(brg / sectorSize) % globalN;

  // Tous les candidats du même secteur dans geoFiltered, sauf le courant
  return globalGeoFiltered
    .filter(c => {
      if (c === currentCandidate) return false;
      const cBrg = c.bearing ?? bearing(globalCenter, c);
      return Math.floor(cBrg / sectorSize) % globalN === sectorIdx;
    })
    .map(c => ({
      ...c,
      // Utiliser walk_sec si déjà calculé par OSRM, sinon estimer
      walk_sec: c.walk_sec ?? (c.dist_geo / (3500/60)),  // 3.5 km/h
      walk_min: c.walk_min ?? (c.dist_geo / (3500/60) / 60),  // 3.5 km/h
    }))
    .sort((a,b) => Math.abs(a.walk_sec - T_sec) - Math.abs(b.walk_sec - T_sec));
}

function buildAlternativesPopup(playerIdx, currentCandidate, _unused, marker, color) {
  const MAX_ALTS = 5;
  const alts     = getSectorAlternatives(playerIdx, currentCandidate).slice(0, MAX_ALTS);
  const totalAlts = alts.length;

  const ptDef = PLACE_TYPES.find(pt => pt.id === currentCandidate.type);
  const icon  = ptDef ? ptDef.icon : (currentCandidate.type === 'custom' ? '📍' : '📍');
  const stars = '★'.repeat(Math.min(currentCandidate.wait_score,10)) + '☆'.repeat(Math.max(0,10-currentCandidate.wait_score));

  const bonusItems = (currentCandidate.bonuses||[]).map(b =>
    `<div style="padding:2px 0;border-bottom:1px solid #f0f0f0;font-size:11px;">${b}</div>`).join('');
  const bonusSection = (currentCandidate.bonuses||[]).length ? `
    <div style="margin-top:6px;padding-top:5px;border-top:1.5px solid #1a6b3c;">
      <div style="font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:#7a9e8a;margin-bottom:3px;">Bonus</div>
      ${bonusItems}
    </div>` : '';

  // Enregistrer le candidat courant dans un index global accessible depuis onclick inline
  if (!window._popupState) window._popupState = {};
  const stateKey = `p${playerIdx}`;
  window._popupState[stateKey] = { playerIdx, color, currentCandidate };

  let altsHtml = '';
  if (alts.length) {
    const altItems = alts.map((alt) => {
      const altDef  = PLACE_TYPES.find(pt=>pt.id===alt.type);
      const altIcon = altDef ? altDef.icon : '📍';
      const altStars = '★'.repeat(Math.min(alt.wait_score,10));
      // Stocker l'alt dans window pour accès inline
      const altKey = `alt_${playerIdx}_${globalGeoFiltered.indexOf(alt)}`;
      window[altKey] = alt;
      return `<div onclick="swapCandidateFull(${playerIdx}, '${altKey}', '${stateKey}')"
        style="padding:6px 8px;border:1px solid #dde8e2;border-radius:3px;cursor:pointer;
               margin-bottom:4px;background:#fff;transition:background .12s;"
        onmouseover="this.style.background='#e8f5ee'" onmouseout="this.style.background='#fff'">
        <div style="font-size:11px;font-weight:600;color:#1a2e24;">${altIcon} ${alt.name}</div>
        <div style="font-size:10px;color:#7a9e8a;margin-top:1px;">
          ⏱ ${alt.walk_min.toFixed(1)} min · ${altStars} ${alt.wait_score}/10
        </div>
      </div>`;
    }).join('');

    altsHtml = `
      <div style="margin-top:8px;padding-top:6px;border-top:1.5px solid #dde8e2;">
        <div style="font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:#7a9e8a;margin-bottom:5px;">
          Top ${totalAlts} alternative${totalAlts>1?'s':''} du secteur
        </div>
        ${altItems}
      </div>`;
  } else {
    altsHtml = `<div style="margin-top:8px;font-size:10px;color:#aaa;font-style:italic;">
      Aucune autre alternative dans ce secteur.</div>`;
  }

  return `<div style="min-width:210px;max-height:420px;overflow-y:auto;font-family:'DM Sans',sans-serif;">
    <div style="font-weight:700;font-size:13px;color:#1a2e24;margin-bottom:3px;">
      <span style="display:inline-block;width:18px;height:18px;border-radius:3px;background:${color};
            color:#fff;text-align:center;line-height:18px;font-size:10px;margin-right:4px;">${playerIdx+1}</span>
      ${currentCandidate.name}
    </div>
    <div style="color:#7a9e8a;font-size:11px;">${icon} ${currentCandidate.type}</div>
    <div style="margin-top:5px;font-size:12px;">⏱ <b>${currentCandidate.walk_min.toFixed(1)} min</b> à pied</div>
    <div style="color:#1a6b3c;font-size:11px;margin-top:2px;">${stars} <b>${currentCandidate.wait_score}/10</b></div>
    ${bonusSection}
    ${altsHtml}
    <div style="margin-top:6px;font-size:9px;color:#bbb;font-family:monospace;">
      ${currentCandidate.lat.toFixed(5)}, ${currentCandidate.lon.toFixed(5)}
    </div>
  </div>`;
}

// changePage removed — no pagination, top 5 only

// ═══════════════════════════════════════════════
// SWAP CANDIDATE — infini, avec fetch OSRM si besoin
// ═══════════════════════════════════════════════
async function swapCandidateFull(playerIdx, altKey, stateKey) {
  const newC = window[altKey];
  if (!newC) return;

  // Calculer walk_sec si pas encore fait via OSRM
  if (!newC.walk_sec || newC.walk_sec === 9999) {
    try {
      const url = `https://router.project-osrm.org/route/v1/foot/${globalCenter.lon},${globalCenter.lat};${newC.lon},${newC.lat}?overview=false`;
      const rd  = await (await fetch(url)).json();
      if (rd.routes && rd.routes[0]) {
        newC.walk_sec = rd.routes[0].duration;
        newC.walk_min = newC.walk_sec / 60;
      }
    } catch(e) {}
  }

  globalSelected[playerIdx] = newC;
  // Mettre à jour le popup state
  if (window._popupState && window._popupState[stateKey]) {
    window._popupState[stateKey].currentCandidate = newC;
  }

  // Mettre à jour le marker sans tout redessiner
  const color = COLORS[playerIdx % COLORS.length];
  const newPopup = buildAlternativesPopup(playerIdx, newC, null, null, color, 0);
  if (globalMarkers[playerIdx]) {
    globalMarkers[playerIdx].setLatLng([newC.lat, newC.lon]);
    globalMarkers[playerIdx].setPopupContent(newPopup);
    globalMarkers[playerIdx].openPopup();
  }

  // Mettre à jour la ligne
  if (globalLines && globalLines[playerIdx]) {
    globalLines[playerIdx].setLatLngs([[globalCenter.lat, globalCenter.lon],[newC.lat, newC.lon]]);
  }

  // Mettre à jour la liste
  const nameEl = document.getElementById('result-name-'+playerIdx);
  const metaEl = document.getElementById('result-meta-'+playerIdx);
  const ptDef  = PLACE_TYPES.find(pt=>pt.id===newC.type);
  const icon   = ptDef ? ptDef.icon : '📍';
  if (nameEl) nameEl.textContent = newC.name;
  if (metaEl) metaEl.innerHTML = `<span>${icon} ${newC.type}</span><span>⏱ ${newC.walk_min.toFixed(1)} min</span>`;
}

// ═══════════════════════════════════════════════
// EXPORT CSV
// ═══════════════════════════════════════════════
function exportCSV() {
  if (!globalSelected.length) return;
  const header = ['Joueur','Nom','Type','Latitude','Longitude','Temps_marche_min','Score_qualite','Bonus'];
  const rows = globalSelected.map((p,i) => [
    i+1,
    `"${p.name.replace(/"/g,'""')}"`,
    p.type,
    p.lat.toFixed(6),
    p.lon.toFixed(6),
    p.walk_min.toFixed(1),
    p.wait_score,
    `"${(p.bonuses||[]).join(' | ')}"`
  ]);
  const csv = [header, ...rows].map(r=>r.join(',')).join('\n');
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = 'deploiement.csv'; a.click();
  URL.revokeObjectURL(url);
}
